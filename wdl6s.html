<!DOCTYPE html>
<html>
<head>
  <title>PAN Card Application Form</title>
</head>
<body bgcolor="lightyellow">

  <h2 align="center">PAN Card Application Form</h2>

  <form>

    <fieldset>
      <legend>Personal Details</legend>

      Full Name:<br>
      <input type="text" name="name" required><br><br>

      Father's Name:<br>
      <input type="text" name="father" required><br><br>

      Date of Birth:<br>
      <input type="date" name="dob" required><br><br>

      Gender:<br>
      <input type="radio" name="gender" value="Male"> Male
      <input type="radio" name="gender" value="Female"> Female
      <input type="radio" name="gender" value="Other"> Other
      <br><br>

      Email:<br>
      <input type="email" name="email" required><br><br>

      Mobile Number:<br>
      <input type="tel" name="mobile" required><br><br>
    </fieldset>

    <br>

    <fieldset>
      <legend>Address Details</legend>

      Address:<br>
      <input type="text" name="address" size="40" required><br><br>

      City:<br>
      <input type="text" name="city" required><br><br>

      State:<br>
      <select name="state" required>
        <option value="MH">Maharashtra</option>
        <option value="DL">Delhi</option>
        <option value="KA">Karnataka</option>
        <option value="GJ">Gujarat</option>
      </select>
      <br><br>

      Pincode:<br>
      <input type="number" name="pincode" required>
    </fieldset>

    <br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

  </form>

</body>
</html>
